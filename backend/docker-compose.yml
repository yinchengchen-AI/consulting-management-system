version: '3.8'

services:
  app:
    build: .
    container_name: consulting-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=consulting_system
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=your-secret-key-change-in-production
      - LOG_LEVEL=info
    depends_on:
      - postgres
      - redis
    networks:
      - consulting-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: consulting-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=consulting_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - consulting-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: consulting-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - consulting-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  consulting-network:
    driver: bridge
